<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="2026商汤奖学金获奖学生风采展示，记录青年人工智能研究者的探索与成果。"
    />
    <meta name="theme-color" content="#061c64" />
    <title>2026商汤奖学金 · 获奖学生</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#students">跳到获奖学生</a>

    <header class="site-header" id="top">
      <a class="wordmark" href="#top" aria-label="商汤，返回页面顶部">
        <img class="brand-logo" src="./assets/brand/sensetime-logo-vi.png" alt="商汤" />
      </a>
      <a class="header-action" href="#students">探索青年力量 <span aria-hidden="true">↘</span></a>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-grid" aria-hidden="true"></div>
        <div class="hero-glow hero-glow-a" aria-hidden="true"></div>
        <div class="hero-glow hero-glow-b" aria-hidden="true"></div>

        <div class="hero-copy">
          <h1 id="hero-title">向智能深处<br /><em>看见青年锋芒</em></h1>
          <p class="hero-description">
            2026年商汤奖学金30位顶尖本科生获奖者<br />
            从大模型、具身智能、生成视觉与智能系统出发<br />
            以好奇心回应未知，以创造力拓宽技术的边界
          </p>
          <div class="hero-actions">
            <a class="primary-button" href="#students">查看获奖学生 <span aria-hidden="true">↓</span></a>
          </div>
        </div>

        <div class="hero-art" aria-label="2026商汤奖学金主视觉">
          <div class="hero-art-frame">
            <img src="./assets/brand/ai-word-cloud.png" alt="人工智能研究成果与研究方向词云" />
          </div>
        </div>
      </section>

      <section class="students-section" id="students" aria-labelledby="students-title">
        <div class="students-intro">
          <div class="section-heading">
            <div>
                <h2 id="students-title">2026 获奖名单</h2>
            </div>
            <p class="sorting-note">（按拼音首字母排序）</p>
          </div>

          <div class="filter-panel" aria-label="学生搜索与筛选">
            <label class="search-box">
              <span aria-hidden="true">⌕</span>
              <span class="sr-only">搜索获奖学生</span>
              <input id="search-input" type="search" placeholder="搜索姓名、学校或研究方向" autocomplete="off" />
            </label>
            <div class="filter-row">
              <div class="filter-group" id="filter-group" role="group" aria-label="按研究方向筛选">
                <button class="filter-button active" type="button" data-category="全部" aria-pressed="true">全部</button>
                <button class="filter-button" type="button" data-category="大模型/智能体" aria-pressed="false">大模型 / 智能体</button>
                <button class="filter-button" type="button" data-category="具身智能/世界模型" aria-pressed="false">具身 / 世界模型</button>
                <button class="filter-button" type="button" data-category="生成/视觉" aria-pressed="false">生成 / 视觉</button>
                <button class="filter-button" type="button" data-category="系统/硬件" aria-pressed="false">系统 / 硬件</button>
                <button class="filter-button" type="button" data-category="安全/对齐" aria-pressed="false">安全 / 对齐</button>
                <button class="filter-button" type="button" data-category="其他" aria-pressed="false">其他</button>
              </div>
              <p class="result-count"><strong id="result-count">30</strong> 位学生</p>
            </div>
          </div>
        </div>

        <div class="winner-list-shell">
          <div class="student-grid" id="student-grid" aria-live="polite"></div>
          <div class="empty-state" id="empty-state" hidden>
            <span aria-hidden="true">⌕</span>
            <strong>没有找到匹配的学生</strong>
            <p>换一个关键词或研究方向试试。</p>
            <button id="reset-filter" type="button">清除筛选</button>
          </div>
        </div>
      </section>

        <section class="closing-section">
          <div class="closing-copy">
            <h2>看见青年，<br />也看见未来。</h2>
        </div>
        <div class="closing-ten" aria-hidden="true">10</div>
        <div class="closing-orbit" aria-hidden="true"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="wordmark footer-wordmark">
          <img class="brand-logo" src="./assets/brand/sensetime-logo-vi.png" alt="商汤" />
        </div>
        <span>© 2026 商汤奖学金</span>
      </div>
    </footer>

    <dialog class="student-dialog" id="student-dialog" aria-labelledby="dialog-name">
      <button class="dialog-close" id="dialog-close" type="button" aria-label="关闭学生详情">×</button>
      <div class="dialog-photo-panel">
        <img id="dialog-photo" alt="" />
        <span class="dialog-id" id="dialog-id"></span>
        <div class="dialog-photo-glow" aria-hidden="true"></div>
      </div>
      <div class="dialog-content">
        <p class="dialog-school" id="dialog-school"></p>
        <h2 id="dialog-name"></h2>
        <p class="dialog-college" id="dialog-college"></p>
        <div class="dialog-fields" id="dialog-fields"></div>
        <p class="dialog-bio" id="dialog-bio"></p>
        <div class="dialog-links" id="dialog-links"></div>
      </div>
    </dialog>

    <script src="./students.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
