<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="2026商汤奖学金获奖学生与人工智能的故事。" />
    <meta name="theme-color" content="#fbfaf7" />
    <title>2026商汤奖学金 · 我与AI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="speech-page">
    <header class="site-header speech-header" id="top">
      <a class="wordmark" href="./index.html" aria-label="返回获奖名单">
        <span class="brand-text">商汤</span>
      </a>
      <a class="header-action" href="./index.html#students">返回名单 <span aria-hidden="true">↗</span></a>
    </header>

    <main class="speech-main">
      <section class="speech-hero" aria-labelledby="speech-title">
        <h1 id="speech-title">我与AI</h1>
        <p>记录青年研究者走近人工智能、探索智能边界的经历与思考。</p>
      </section>

      <section class="speech-list" id="speech-list" aria-label="我与AI列表"></section>
    </main>

    <script src="./students.js"></script>
    <script>
      (() => {
        const list = document.querySelector("#speech-list");
        const students = [...(window.STUDENTS || [])].sort((a, b) =>
          a.pinyin.localeCompare(b.pinyin, "en", { sensitivity: "base" })
        );
        const fragment = document.createDocumentFragment();
        students.forEach((student) => {
          const item = document.createElement("article");
          item.className = "speech-item";
          item.id = student.id;
          const title = document.createElement("h2");
          title.textContent = student.name;
          const meta = document.createElement("p");
          meta.className = "speech-meta";
          meta.textContent = `${student.school}${student.college}`;
          const content = document.createElement("div");
          content.className = "speech-content";
          const paragraphs = student.speech
            ? student.speech.split(/\n\s*\n/).filter(Boolean)
            : ["内容待更新。"];
          paragraphs.forEach((text) => {
            const paragraph = document.createElement("p");
            paragraph.textContent = text;
            content.append(paragraph);
          });
          item.append(title, meta, content);
          fragment.append(item);
        });
        list.replaceChildren(fragment);
      })();
    </script>
  </body>
</html>
